{% extends "auth_base.html" %}

{% block title %}Login - ExpenseTrack{% endblock %}

{% block content %}
<div class="w-full">
    <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2 text-center">Welcome back</h2>
    <p class="text-gray-600 dark:text-gray-300 mb-8 text-center">Sign in to manage your expenses</p>

    <form id="login-form" class="space-y-5">
        {% csrf_token %}
        
        <!-- Email -->
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-envelope text-gray-400"></i>
                </div>
                <input type="email" id="email" class="w-full pl-10 pr-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent dark:bg-gray-700 dark:border-gray-600" placeholder="your@email.com" required>
            </div>
        </div>

        <!-- Password -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-lock text-gray-400"></i>
                </div>
                <input type="password" id="password" class="w-full pl-10 pr-10 py-3 border rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent dark:bg-gray-700 dark:border-gray-600" placeholder="••••••••" required>
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                    <button type="button" id="togglePassword" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none">
                        <i id="passwordEye" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <!-- <div class="flex justify-between mt-2">
                <div class="flex items-center">
                    <input id="remember-me" type="checkbox" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-xs text-gray-700 dark:text-gray-300">Remember me</label>
                </div>
                <a href="#" class="text-xs text-purple-600 hover:text-purple-800 dark:text-purple-400">Forgot password?</a>
            </div> -->
        </div>

        <!-- Terms -->
        <!-- <div class="text-xs text-gray-500 dark:text-gray-400">
            By continuing, you agree to ExpenseTrack's 
            <a href="#" class="text-purple-600 dark:text-purple-400">Terms</a> and 
            <a href="#" class="text-purple-600 dark:text-purple-400">Privacy Policy</a>.
        </div> -->

        <!-- Submit Button -->
        <div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                <span id="login-text">Sign In</span>
                <i id="login-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
            </button>
        </div>
    </form>

    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 dark:text-gray-400">
            Don't have an account?
            <a href="{% url 'signup-page' %}" class="text-purple-600 hover:text-purple-800 dark:text-purple-400 dark:hover:text-purple-300 font-medium">Sign up</a>
        </p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('login-form');
        const loginText = document.getElementById('login-text');
        const loginSpinner = document.getElementById('login-spinner');
        
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const passwordEye = document.getElementById('passwordEye');
        
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                passwordEye.classList.toggle('fa-eye');
                passwordEye.classList.toggle('fa-eye-slash');
            });
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                // remember: document.getElementById('remember-me').checked
            };

            // Show loading state
            loginText.textContent = 'Signing in...';
            loginSpinner.classList.remove('hidden');

            fetch('/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({status: response.status, body: data})))
            .then(result => {
                if (result.status === 200) {
                    // Save tokens
                    localStorage.setItem('access_token', result.body.token.access);
                    localStorage.setItem('refresh_token', result.body.token.refresh);

                    showMessage('success', 'Login successful! Redirecting...');
                    setTimeout(() => window.location.href = "{% url 'dashboard-page' %}", 1000);
                } else {
                    const errorMsg = result.body.detail || 'Invalid email or password';
                    showMessage('error', errorMsg);
                    loginText.textContent = 'Sign In';
                    loginSpinner.classList.add('hidden');
                }
            })
            .catch(error => {
                showMessage('error', 'Network error. Please try again.');
                loginText.textContent = 'Sign In';
                loginSpinner.classList.add('hidden');
            });
        });
    });
</script>
{% endblock %}
