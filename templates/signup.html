{% extends "auth_base.html" %}

{% block title %}Sign Up - ExpenseTrack{% endblock %}

{% block content %}
<div class="w-full">
    <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2 text-center">Create your account</h2>
    <p class="text-gray-600 dark:text-gray-300 mb-8 text-center">Start tracking your expenses today</p>

    <form id="registration-form" class="space-y-5">
        {% csrf_token %}
        
        <!-- Name Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="first_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">First Name</label>
                <input type="text" id="first_name" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent dark:bg-gray-700 dark:border-gray-600" placeholder="Saqib" required>
            </div>
            <div>
                <label for="last_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Last Name</label>
                <input type="text" id="last_name" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent dark:bg-gray-700 dark:border-gray-600" placeholder="Shaikh" required>
            </div>
        </div>

        <!-- Email/Phone -->
        <div>
            <label for="email_or_phone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-user text-gray-400"></i>
                </div>
                <input type="text" id="email_or_phone" class="w-full pl-10 pr-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent dark:bg-gray-700 dark:border-gray-600" placeholder="saqib@example.com" required>
            </div>
        </div>

        <!-- Gender & DOB Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="gender" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Gender</label>
                <div class="relative">
                    <select id="gender" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent dark:bg-gray-700 dark:border-gray-600 appearance-none" required>
                        <option value="">Select Gender</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                        <i class="fas fa-chevron-down text-gray-400"></i>
                    </div>
                </div>
            </div>
            <div>
                <label for="dob" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Date of Birth</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-calendar text-gray-400"></i>
                    </div>
                    <input type="date" id="dob" class="w-full pl-10 pr-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent dark:bg-gray-700 dark:border-gray-600" required>
                </div>
            </div>
        </div>

        <!-- Password -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-key text-gray-400"></i>
                </div>
                <input type="password" id="password" class="w-full pl-10 pr-10 py-3 border rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent dark:bg-gray-700 dark:border-gray-600" placeholder="••••••••" required>
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                    <button type="button" id="togglePassword" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none">
                        <i id="passwordEye" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mt-2 text-xs text-gray-500 dark:text-gray-400">
                <p class="flex items-center"><i class="fas fa-info-circle mr-1"></i> Minimum 6 characters with numbers</p>
            </div>
        </div>

        <!-- Submit Button -->
        <div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                <span id="register-text">Create Account</span>
                <i id="register-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
            </button>
        </div>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
        Already have an account?
        <a href="{% url 'login-page' %}" class="text-purple-600 hover:text-purple-800 dark:text-purple-400 dark:hover:text-purple-300 font-medium">Log in</a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('registration-form');
        const registerText = document.getElementById('register-text');
        const registerSpinner = document.getElementById('register-spinner');
        
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const passwordEye = document.getElementById('passwordEye');
        
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                passwordEye.classList.toggle('fa-eye');
                passwordEye.classList.toggle('fa-eye-slash');
            });
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const email_or_phone = document.getElementById('email_or_phone').value;
            const isEmail = email_or_phone.includes('@');

            const data = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                gender: document.getElementById('gender').value,
                date_of_birth: document.getElementById('dob').value,
                password: document.getElementById('password').value
            };

            if (isEmail) {
                data.email = email_or_phone;
            } else {
                data.phone_number = email_or_phone;
            }

            // Show loading state
            registerText.textContent = 'Creating account...';
            registerSpinner.classList.remove('hidden');

            fetch('/register/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({status: response.status, body: data})))
            .then(result => {
                if (result.status === 201) {
                    showMessage('success', 'Registration successful! Redirecting...');
                    setTimeout(() => window.location.href = "{% url 'login-page' %}", 1500);
                } else {
                    const err = result.body;
                    const errorMsg = err.detail || err.email?.[0] || err.phone_number?.[0] || err.non_field_errors?.[0] || 'Registration failed. Please try again.';
                    showMessage('error', errorMsg);
                    registerText.textContent = 'Create Account';
                    registerSpinner.classList.add('hidden');
                }
            })
            .catch(error => {
                showMessage('error', 'Network error. Please try again.');
                registerText.textContent = 'Create Account';
                registerSpinner.classList.add('hidden');
            });
        });
    });
</script>
{% endblock %}
